<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mappa Concettuale Fotografia 3D</title>
  <style>
    :root {
      --bg: #0b0f19;
      --panel: rgba(10, 14, 24, 0.85);
      --text: #e8ecff;
      --muted: #9aa7c5;
      --privato: #ff7f7f;
      --pubblico: #74d1ff;
      --istituzionale: #ffd166;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, sans-serif;
    }

    #ui {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 12px 14px;
      width: min(360px, calc(100vw - 28px));
      backdrop-filter: blur(8px);
      box-sizing: border-box;
    }

    #ui h1 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    #ui .subtitle {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .filter {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      user-select: none;
    }

    .badge {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .zoom-controls {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .zoom-btn {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      width: 28px;
      height: 24px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .zoom-readout {
      font-size: 12px;
      color: var(--muted);
      min-width: 58px;
      text-align: center;
    }

    #labels-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      overflow: hidden;
      font-family: Inter, Segoe UI, Roboto, sans-serif;
    }

    #labels-fallback {
      position: fixed;
      right: 14px;
      top: 14px;
      z-index: 9;
      max-width: min(34vw, 460px);
      max-height: calc(100vh - 28px);
      overflow: auto;
      background: rgba(10, 14, 24, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      padding: 8px 10px;
      color: #e8ecff;
      display: none;
      font-size: 12px;
      line-height: 1.25;
    }

    .node-label {
      position: fixed;
      transform: translate(-50%, -50%);
      color: #fff;
      background: rgba(8, 12, 20, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      padding: 2px 6px;
      white-space: nowrap;
      line-height: 1.2;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.55);
      pointer-events: auto;
      cursor: pointer;
      z-index: 31;
    }

    .node-label.node-label--expanded {
      white-space: normal;
      max-width: min(340px, 46vw);
      line-height: 1.25;
      z-index: 1;
    }

  </style>
</head>
<body>
  <div id="ui">
    <h1>Mappa Concettuale 3D - Fotografia</h1>
    <p class="subtitle">
      Filtra i nodi per chiave di lettura e osserva gli intrecci tra i contenuti.
    </p>
    <div class="filters">
      <label class="filter">
        <input id="privato" type="checkbox" checked />
        <span class="badge" style="background: var(--privato)"></span>
        Privato
      </label>
      <label class="filter">
        <input id="pubblico" type="checkbox" checked />
        <span class="badge" style="background: var(--pubblico)"></span>
        Pubblico
      </label>
      <label class="filter">
        <input id="istituzionale" type="checkbox" checked />
        <span class="badge" style="background: var(--istituzionale)"></span>
        Istituzionale
      </label>
    </div>
    <div class="hint">
      Trascina per ruotare. Usa rotella o + / - per zoom.
    </div>
    <div class="zoom-controls">
      <button id="zoom-out" class="zoom-btn" type="button">-</button>
      <button id="zoom-in" class="zoom-btn" type="button">+</button>
      <span id="zoom-readout" class="zoom-readout">100%</span>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script>
    let table;
    let graph;
    let loadError = "";
    let rowsLoaded = 0;
    let labelsLayer;
    let labelsFallback;
    const labelEls = new Map();
    const expandedLabelIds = new Set();
    const activeScopes = new Set(["privato", "pubblico", "istituzionale"]);
    let viewScale = 1;

    const palette = {
      privato: [255, 127, 127],
      pubblico: [116, 209, 255],
      istituzionale: [255, 209, 102]
    };

    const layoutConfig = {
      categoryRadiusX: 360,
      categoryRadiusZ: 340,
      categoryJitterY: 120,
      subOffsetRadius: 240,
      subJitterY: 120,
      detailMinRadius: 320,
      detailRadiusSpread: 180,
      detailJitterY: 200
    };

    function setup() {
      const cnv = createCanvas(windowWidth, windowHeight, WEBGL);
      textFont("Arial");
      textSize(12);
      textAlign(CENTER, CENTER);
      labelsLayer = document.createElement("div");
      labelsLayer.id = "labels-layer";
      document.body.appendChild(labelsLayer);
      labelsFallback = document.createElement("div");
      labelsFallback.id = "labels-fallback";
      document.body.appendChild(labelsFallback);
      attachLabelToggleEvents();
      attachFilterEvents();
      attachZoomControls(cnv);
      updateZoomReadout();
      graph = {
        categories: [],
        subcategories: [],
        details: [],
        links: [],
        detailInterweaves: []
      };

      loadTable(
        "Mappa Fotografia.csv",
        "csv",
        "header",
        (loadedTable) => {
          table = loadedTable;
          graph = buildGraph(table);
          rowsLoaded = graph.details.length;
          loadError = "";
        },
        () => {
          loadError = "Errore CSV: apri con server locale (non file://).";
        }
      );
    }

    function draw() {
      background(11, 15, 25);
      orbitControl(2, 2, 0.8);
      ambientLight(80, 90, 110);
      directionalLight(220, 230, 255, -0.4, -0.6, -1);
      pointLight(200, 200, 220, 0, -220, 260);

      drawGridSphere(980, 22);
      drawConnections();
      drawNodes();
      drawLabels3D();
      drawStatusOverlay();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    function attachFilterEvents() {
      ["privato", "pubblico", "istituzionale"].forEach((id) => {
        const el = document.getElementById(id);
        el.addEventListener("change", () => {
          if (el.checked) activeScopes.add(id);
          else activeScopes.delete(id);
        });
      });
    }

    function attachLabelToggleEvents() {
      document.addEventListener("pointerdown", (event) => {
        const labelEl = event.target.closest(".node-label");
        if (!labelEl) return;

        const id = labelEl.dataset.id;
        const shortable = labelEl.dataset.shortable === "true";
        if (!id || !shortable) return;

        // Prevent orbitControl from eating the interaction.
        event.preventDefault();
        event.stopPropagation();

        if (expandedLabelIds.has(id)) expandedLabelIds.delete(id);
        else expandedLabelIds.add(id);
        updateDomLabels();
      }, true);
    }

    function classifyScopes(categoria, sottocategoria, dettaglio) {
      const source = `${categoria} ${sottocategoria} ${dettaglio}`.toLowerCase();
      const scopes = new Set();
      const categoryScopes = {
        "Immagini ricordo": ["privato"],
        "Pratica amatoriale": ["privato"],
        "La cronaca": ["pubblico"],
        "La moda": ["pubblico"],
        "La pubblicità": ["pubblico"],
        "Il mondo editoriale": ["pubblico"],
        "Prodotti di stampa": ["pubblico"],
        "Il fotoromanzo": ["pubblico"],
        "Immagini scientifiche": ["istituzionale"],
        "Immagini industriali": ["istituzionale"],
        "Riprese aeree": ["istituzionale"],
        "Il ritratto": ["istituzionale", "pubblico"],
        "Il mondo dell'arte": ["pubblico", "privato"]
      };

      if (categoryScopes[categoria]) {
        categoryScopes[categoria].forEach((s) => scopes.add(s));
      }

      if (/(famiglia|ricorrenze|vacanze|cerimonie|feste|viaggi|tempo libero|ritratto|amatoriale|club|concorsi|hobbistica|cucina)/.test(source)) {
        scopes.add("privato");
      }
      if (/(cronaca|moda|pubblicit|editoriale|stampa|manifesti|riviste|social|sport|turismo|musica|cinema|teatro|danza)/.test(source)) {
        scopes.add("pubblico");
      }
      if (/(istituzionale|scientific|industriali|militare|cartografia|spionaggio|controllo|giudiziari|identit|documenti|schedatura|urbanistica|ricerca)/.test(source)) {
        scopes.add("istituzionale");
      }

      if (scopes.size === 0) {
        scopes.add("pubblico");
      }

      return scopes;
    }

    function buildGraph(csv) {
      const categories = new Map();
      const subcategories = new Map();
      const details = [];
      const links = [];

      const rows = csv.getRows().filter((r) => r.arr.some((c) => String(c).trim().length > 0));
      const catCount = rows.reduce((m, r) => {
        const c = r.get("Categoria Principale").trim();
        m[c] = (m[c] || 0) + 1;
        return m;
      }, {});

      const sortedCats = Object.keys(catCount).sort((a, b) => catCount[b] - catCount[a]);
      const catIndex = new Map(sortedCats.map((c, i) => [c, i]));
      const catTotal = sortedCats.length;

      rows.forEach((row, idx) => {
        const categoria = row.get("Categoria Principale").trim();
        const sottocategoria = row.get("Sottocategoria").trim();
        const dettaglio = row.get("Dettaglio / Note").trim();
        const scopes = classifyScopes(categoria, sottocategoria, dettaglio);

        if (!categories.has(categoria)) {
          const ci = catIndex.get(categoria) ?? 0;
          const angle = map(ci, 0, max(1, catTotal), 0, TWO_PI);
          categories.set(categoria, {
            id: `cat-${ci}`,
            label: categoria,
            level: 0,
            scopes: new Set(scopes),
            pos: createVector(
              cos(angle) * layoutConfig.categoryRadiusX,
              sin(ci * 0.8) * layoutConfig.categoryJitterY,
              sin(angle) * layoutConfig.categoryRadiusZ
            )
          });
        } else {
          scopes.forEach((s) => categories.get(categoria).scopes.add(s));
        }

        const subKey = `${categoria}:::${sottocategoria}`;
        if (!subcategories.has(subKey)) {
          const base = categories.get(categoria).pos;
          const seed = hashCode(subKey);
          const angle = (seed % 360) * (PI / 180);
          subcategories.set(subKey, {
            id: `sub-${subcategories.size}`,
            label: sottocategoria,
            level: 1,
            scopes: new Set(scopes),
            pos: createVector(
              base.x + cos(angle) * layoutConfig.subOffsetRadius,
              base.y + ((seed % (layoutConfig.subJitterY * 2)) - layoutConfig.subJitterY),
              base.z + sin(angle) * layoutConfig.subOffsetRadius
            ),
            parent: categoria
          });
          links.push({ from: categories.get(categoria), to: subcategories.get(subKey), type: "hier" });
        } else {
          scopes.forEach((s) => subcategories.get(subKey).scopes.add(s));
        }

        const subNode = subcategories.get(subKey);
        const dSeed = hashCode(`${subKey}::${dettaglio}::${idx}`);
        const dAngle = (dSeed % 360) * (PI / 180);
        const dRadius = layoutConfig.detailMinRadius + (dSeed % layoutConfig.detailRadiusSpread);

        const detailNode = {
          id: `det-${idx}`,
          label: dettaglio,
          level: 2,
          scopes,
          words: extractWords(dettaglio),
          pos: createVector(
            subNode.pos.x + cos(dAngle) * dRadius,
            subNode.pos.y + ((dSeed % (layoutConfig.detailJitterY * 2)) - layoutConfig.detailJitterY),
            subNode.pos.z + sin(dAngle) * dRadius
          ),
          parent: subKey
        };

        details.push(detailNode);
        links.push({ from: subNode, to: detailNode, type: "hier" });
      });

      centerGraphNodes(categories, subcategories, details);
      const detailInterweaves = buildInterweaves(details);

      return {
        categories: [...categories.values()],
        subcategories: [...subcategories.values()],
        details,
        links,
        detailInterweaves
      };
    }

    function centerGraphNodes(categoriesMap, subcategoriesMap, detailsList) {
      const allNodes = [
        ...categoriesMap.values(),
        ...subcategoriesMap.values(),
        ...detailsList
      ];
      if (allNodes.length === 0) return;

      let minX = Infinity;
      let minY = Infinity;
      let minZ = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;
      let maxZ = -Infinity;

      allNodes.forEach((node) => {
        const { x, y, z } = node.pos;
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (z < minZ) minZ = z;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
        if (z > maxZ) maxZ = z;
      });

      const centerX = (minX + maxX) * 0.5;
      const centerY = (minY + maxY) * 0.5;
      const centerZ = (minZ + maxZ) * 0.5;
      const uiCompensationX = getUiCompensationX();

      allNodes.forEach((node) => {
        node.pos.x = (node.pos.x - centerX) + uiCompensationX;
        node.pos.y -= centerY;
        node.pos.z -= centerZ;
      });
    }

    function getUiCompensationX() {
      const ui = document.getElementById("ui");
      if (!ui) return 0;
      const rect = ui.getBoundingClientRect();
      // Centra visivamente il grafo compensando il pannello laterale.
      return rect.width * 0.45;
    }

    function buildInterweaves(details) {
      const edges = [];
      const limit = min(220, details.length * 4);
      for (let i = 0; i < details.length; i++) {
        for (let j = i + 1; j < details.length; j++) {
          const a = details[i];
          const b = details[j];
          const shared = intersectionSize(a.words, b.words);
          if (shared < 1) continue;

          const d = p5.Vector.dist(a.pos, b.pos);
          if (d > 900) continue;

          edges.push({ from: a, to: b, strength: shared });
          if (edges.length >= limit) return edges;
        }
      }
      return edges;
    }

    function extractWords(txt) {
      const stop = new Set(["della", "delle", "dello", "dell", "degli", "dalla", "dalla", "dalle", "alla", "alle", "nella", "nelle", "per", "con", "del", "dei", "gli", "una", "uno", "che", "nel", "nei", "dai", "sul", "sui", "allo", "agli", "dall"]);
      return new Set(
        txt
          .toLowerCase()
          .replace(/[^a-z0-9à-ÿ\s]/gi, " ")
          .split(/\s+/)
          .map((w) => w.trim())
          .filter((w) => w.length >= 5 && !stop.has(w))
      );
    }

    function intersectionSize(setA, setB) {
      let count = 0;
      setA.forEach((x) => {
        if (setB.has(x)) count++;
      });
      return count;
    }

    function nodeVisible(node) {
      for (const s of node.scopes) {
        if (activeScopes.has(s)) return true;
      }
      return false;
    }

    function nodeColor(node) {
      const colors = [];
      node.scopes.forEach((s) => {
        if (activeScopes.has(s)) colors.push(palette[s]);
      });
      if (colors.length === 0) return [120, 130, 150];
      const c = [0, 0, 0];
      colors.forEach((x) => {
        c[0] += x[0];
        c[1] += x[1];
        c[2] += x[2];
      });
      return [c[0] / colors.length, c[1] / colors.length, c[2] / colors.length];
    }

    function drawGridSphere(radius, count) {
      push();
      noFill();
      stroke(80, 95, 130, 35);
      strokeWeight(1);
      for (let i = 0; i < count; i++) {
        const y = map(i, 0, count - 1, -radius * 0.5, radius * 0.5);
        const r = sqrt(max(0, radius * radius - y * y));
        push();
        translate(0, y, 0);
        rotateX(HALF_PI);
        ellipse(0, 0, r * 2, r * 2);
        pop();
      }
      pop();
    }

    function drawConnections() {
      if (!graph) return;
      strokeWeight(1.2);
      graph.links.forEach((edge) => {
        if (!nodeVisible(edge.from) || !nodeVisible(edge.to)) return;
        stroke(130, 160, 210, 55);
        line(
          scaleCoord(edge.from.pos.x), scaleCoord(edge.from.pos.y), scaleCoord(edge.from.pos.z),
          scaleCoord(edge.to.pos.x), scaleCoord(edge.to.pos.y), scaleCoord(edge.to.pos.z)
        );
      });

      graph.detailInterweaves.forEach((edge) => {
        if (!nodeVisible(edge.from) || !nodeVisible(edge.to)) return;
        const alpha = map(edge.strength, 1, 5, 35, 120, true);
        stroke(255, 255, 255, alpha);
        line(
          scaleCoord(edge.from.pos.x), scaleCoord(edge.from.pos.y), scaleCoord(edge.from.pos.z),
          scaleCoord(edge.to.pos.x), scaleCoord(edge.to.pos.y), scaleCoord(edge.to.pos.z)
        );
      });
    }

    function drawNodes() {
      if (!graph) return;
      const all = [...graph.categories, ...graph.subcategories, ...graph.details];
      all.forEach((node) => {
        if (!nodeVisible(node)) return;
        const c = nodeColor(node);
        const diameter = node.level === 0 ? 30 : node.level === 1 ? 22 : 14;

        push();
        translate(scaleCoord(node.pos.x), scaleCoord(node.pos.y), scaleCoord(node.pos.z));
        noStroke();
        ambientMaterial(c[0], c[1], c[2], 235);
        shininess(24);
        sphere((diameter * 0.5) * constrain(0.8 + (viewScale * 0.2), 0.8, 1.25), 18, 14);
        pop();
      });
    }

    function drawLabels3D() {
      if (frameCount % 2 === 0) updateDomLabels();
    }

    function updateDomLabels() {
      if (!graph || !labelsLayer) return;
      if (labelsFallback) labelsFallback.style.display = "none";
      const all = [...graph.categories, ...graph.subcategories, ...graph.details];
      const visibleIds = new Set();

      all.forEach((node) => {
        if (!nodeVisible(node)) return;

        const projected = worldToScreenStable(
          scaleCoord(node.pos.x),
          scaleCoord(node.pos.y),
          scaleCoord(node.pos.z)
        );
        if (!projected) return;
        const sx = projected.x;
        const sy = projected.y;

        const yOffset = node.level === 0 ? 22 : node.level === 1 ? 18 : 14;
        const shortLabel = shortenToThreeWords(node.label);
        const id = node.id;
        visibleIds.add(id);

        let el = labelEls.get(id);
        if (!el) {
          el = document.createElement("div");
          el.className = "node-label";
          document.body.appendChild(el);
          labelEls.set(id, el);
        }

        const canExpand = countWords(node.label) > 3;
        const isExpanded = expandedLabelIds.has(id);
        el.textContent = (canExpand && isExpanded) ? node.label : shortLabel;
        el.title = node.label;
        el.dataset.id = id;
        el.dataset.shortable = String(canExpand);
        el.classList.toggle("node-label--expanded", isExpanded);
        el.style.cursor = canExpand ? "pointer" : "default";
        el.style.left = `${sx}px`;
        el.style.top = `${sy - yOffset}px`;
        el.style.fontSize = node.level === 2 ? "11px" : "13px";
        el.style.display = (
          sx < -120 || sx > windowWidth + 120 || sy < -50 || sy > windowHeight + 50
        ) ? "none" : "block";
      });

      labelEls.forEach((el, id) => {
        if (!visibleIds.has(id)) el.style.display = "none";
      });
    }

    function renderFallbackLabels() {
      if (!graph || !labelsFallback) return;
      if (frameCount % 15 !== 0) return;
      const all = [...graph.categories, ...graph.subcategories, ...graph.details].filter(nodeVisible);
      const html = all.map((n) => {
        const c = nodeColor(n);
        const dot = `rgb(${Math.round(c[0])}, ${Math.round(c[1])}, ${Math.round(c[2])})`;
        const text = (n.label || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return `<div style="display:flex;align-items:center;gap:6px;margin:3px 0;">
          <span style="width:8px;height:8px;border-radius:50%;background:${dot};display:inline-block;"></span>
          <span>${text}</span>
        </div>`;
      }).join("");
      labelsFallback.innerHTML = html || "<div>Nessuna etichetta visibile con i filtri correnti.</div>";
      labelsFallback.style.display = "block";
    }

    function shortenToThreeWords(label) {
      const words = String(label || "").trim().split(/\s+/).filter(Boolean);
      if (words.length <= 3) return words.join(" ");
      return `${words.slice(0, 3).join(" ")}...`;
    }

    function countWords(label) {
      return String(label || "").trim().split(/\s+/).filter(Boolean).length;
    }

    function worldToScreen(x, y, z) {
      try {
        if (typeof screenPosition === "function") {
          const p = screenPosition(x, y, z);
          if (p && Number.isFinite(p.x) && Number.isFinite(p.y)) return { x: p.x, y: p.y };
        }
        if (typeof screenX === "function" && typeof screenY === "function") {
          const sx = screenX(x, y, z);
          const sy = screenY(x, y, z);
          if (Number.isFinite(sx) && Number.isFinite(sy)) return { x: sx, y: sy };
        }
      } catch (e) {
        return null;
      }
      return null;
    }

    function worldToScreenStable(x, y, z) {
      const r = _renderer;
      if (!r || !r.uMVMatrix || !r.uPMatrix) return worldToScreen(x, y, z);
      const mv = r.uMVMatrix.mat4;
      const p = r.uPMatrix.mat4;
      if (!mv || !p) return worldToScreen(x, y, z);

      const eye = mulMat4Vec4(mv, [x, y, z, 1]);
      const clip = mulMat4Vec4(p, eye);
      const w = clip[3];
      if (!Number.isFinite(w) || abs(w) < 1e-6) return null;

      const ndcX = clip[0] / w;
      const ndcY = clip[1] / w;
      const ndcZ = clip[2] / w;
      if (!Number.isFinite(ndcX) || !Number.isFinite(ndcY) || !Number.isFinite(ndcZ)) return null;
      if (ndcZ < -1.1 || ndcZ > 1.1) return null;

      return {
        x: (ndcX * 0.5 + 0.5) * width,
        y: (1 - (ndcY * 0.5 + 0.5)) * height
      };
    }

    function mulMat4Vec4(m, v) {
      return [
        m[0] * v[0] + m[4] * v[1] + m[8] * v[2] + m[12] * v[3],
        m[1] * v[0] + m[5] * v[1] + m[9] * v[2] + m[13] * v[3],
        m[2] * v[0] + m[6] * v[1] + m[10] * v[2] + m[14] * v[3],
        m[3] * v[0] + m[7] * v[1] + m[11] * v[2] + m[15] * v[3]
      ];
    }

    function attachZoomControls(canvasElt) {
      const zoomInBtn = document.getElementById("zoom-in");
      const zoomOutBtn = document.getElementById("zoom-out");
      zoomInBtn.addEventListener("click", () => setViewScale(viewScale * 1.14));
      zoomOutBtn.addEventListener("click", () => setViewScale(viewScale / 1.14));

      // Wheel zoom works anywhere on canvas, independent from orbit internals.
      const wheelTarget = canvasElt?.elt || document;
      wheelTarget.addEventListener("wheel", (e) => {
        if (e.deltaY < 0) setViewScale(viewScale * 1.06);
        else setViewScale(viewScale / 1.06);
      }, { passive: true });

      window.addEventListener("keydown", (e) => {
        if (e.key === "+" || e.key === "=") setViewScale(viewScale * 1.08);
        if (e.key === "-") setViewScale(viewScale / 1.08);
      });
    }

    function setViewScale(next) {
      viewScale = constrain(next, 0.35, 3.5);
      updateZoomReadout();
    }

    function updateZoomReadout() {
      const el = document.getElementById("zoom-readout");
      if (!el) return;
      el.textContent = `${Math.round(viewScale * 100)}%`;
    }

    function scaleCoord(v) {
      return v * viewScale;
    }

    function drawStatusOverlay() {
      resetMatrix();
      translate(-width / 2, -height / 2);
      noStroke();
      const msg = loadError || `Righe caricate: ${rowsLoaded}`;
      fill(8, 12, 20, 185);
      rect(14, height - 38, 330, 24, 6);
      fill(loadError ? color(255, 120, 120) : color(160, 220, 170));
      textAlign(LEFT, CENTER);
      textSize(12);
      text(msg, 22, height - 26);
      textAlign(CENTER, CENTER);
    }

    function hashCode(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return abs(h);
    }
  </script>
</body>
